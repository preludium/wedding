name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  static:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.14"

      - name: Check formatting
        run: terraform fmt -check -recursive infrastructure/

      - name: Init (offline)
        run: terraform init -backend=false
        working-directory: infrastructure

      - name: Validate
        run: terraform validate
        working-directory: infrastructure

      - uses: terraform-linters/setup-tflint@v4

      - name: Lint
        run: tflint --recursive -f compact
        working-directory: infrastructure

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infrastructure/
          severity: HIGH,CRITICAL
          exit-code: 1
          trivy-config: --ignorefile infrastructure/.trivyignore

  plan:
    name: Terraform Plan
    needs: static
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Detect infra changes
        id: diff
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - infrastructure/**

      - uses: hashicorp/setup-terraform@v3
        if: steps.diff.outputs.infra == 'true'
        with:
          terraform_version: "~1.14"

      - name: Auth to AWS
        if: steps.diff.outputs.infra == 'true'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Init
        if: steps.diff.outputs.infra == 'true'
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=infrastructure/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true"
        working-directory: infrastructure

      - name: Plan
        if: steps.diff.outputs.infra == 'true'
        run: terraform plan -no-color
        working-directory: infrastructure
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_bucket_name_prefix: ${{ vars.TF_BUCKET_NAME_PREFIX }}
          TF_VAR_cloudfront_price_class: ${{ vars.TF_CLOUDFRONT_PRICE_CLASS }}
          TF_VAR_tags: ${{ vars.TF_TAGS }}
          TF_VAR_cors_allowed_origins: ${{ vars.TF_CORS_ALLOWED_ORIGINS }}
          TF_VAR_budget_alert_email: ${{ secrets.TF_BUDGET_ALERT_EMAIL }}
          TF_VAR_github_org: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}
