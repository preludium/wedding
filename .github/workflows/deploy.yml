name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build
              env:
                  VITE_BASE_PATH: /${{ github.event.repository.name }}/

                  VITE_NAME_1: ${{ secrets.VITE_NAME_1 }}
                  VITE_NAME_2: ${{ secrets.VITE_NAME_2 }}
                  VITE_WEDDING_DATE: ${{ secrets.VITE_WEDDING_DATE }}

                  VITE_VENUE_1_NAME: ${{ secrets.VITE_VENUE_1_NAME }}
                  VITE_VENUE_1_ADDRESS: ${{ secrets.VITE_VENUE_1_ADDRESS }}
                  VITE_VENUE_1_DESC: ${{ secrets.VITE_VENUE_1_DESC }}
                  VITE_VENUE_2_NAME: ${{ secrets.VITE_VENUE_2_NAME }}
                  VITE_VENUE_2_ADDRESS: ${{ secrets.VITE_VENUE_2_ADDRESS }}
                  VITE_VENUE_2_DESC: ${{ secrets.VITE_VENUE_2_DESC }}

                  VITE_RSVP_DATE: ${{ secrets.VITE_RSVP_DATE }}

                  VITE_CONTACT_1: ${{ secrets.VITE_CONTACT_1 }}
                  VITE_CONTACT_2: ${{ secrets.VITE_CONTACT_2 }}

                  VITE_IMG_COUPLE: ${{ secrets.VITE_IMG_COUPLE }}
                  VITE_IMG_VENUE_1: ${{ secrets.VITE_IMG_VENUE_1 }}
                  VITE_IMG_VENUE_2: ${{ secrets.VITE_IMG_VENUE_2 }}
                  VITE_IMG_GAL1: ${{ secrets.VITE_IMG_GAL1 }}
                  VITE_IMG_GAL2: ${{ secrets.VITE_IMG_GAL2 }}
                  VITE_IMG_GAL3: ${{ secrets.VITE_IMG_GAL3 }}
                  VITE_IMG_GAL4: ${{ secrets.VITE_IMG_GAL4 }}
                  VITE_IMG_GAL5: ${{ secrets.VITE_IMG_GAL5 }}
                  VITE_IMG_GAL6: ${{ secrets.VITE_IMG_GAL6 }}

            - uses: actions/configure-pages@v5

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
