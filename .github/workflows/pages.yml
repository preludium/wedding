name: Pages

on:
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: production
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_PATH: /wedding/
          VITE_IMG_COUPLE: https://${{ vars.CF_DOMAIN }}/couple.jpg
          VITE_IMG_VENUE_1: https://${{ vars.CF_DOMAIN }}/venue-1.jpg
          VITE_IMG_VENUE_2: https://${{ vars.CF_DOMAIN }}/venue-2.jpg

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
