name: Pages

on:
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_PATH: /wedding/
          VITE_IMG_COUPLE: https://${{ vars.CF_DOMAIN }}/couple.jpg
          VITE_IMG_VENUE_1: https://${{ vars.CF_DOMAIN }}/venue-1.jpg
          VITE_IMG_VENUE_2: https://${{ vars.CF_DOMAIN }}/venue-2.jpg

      - name: Publish
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          force_orphan: true
